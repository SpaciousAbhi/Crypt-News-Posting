# config.yaml

# A list of forwarding tasks. Each task is a dictionary defining the
# sources, targets, and AI modifications.
#
# IMPORTANT: You must use numerical Channel IDs for sources and targets, not
# usernames (e.g., @channel_name).
#
# How to find a Channel ID:
# 1. Forward a message from the channel to a bot like @userinfobot.
# 2. The bot will reply with the channel's ID (it's usually a negative number).

tasks:
  - name: "Twitter to Telegram News"
    paused: false
    sources:
      - platform: "twitter"
        identifier: "elonmusk"
    targets:
      - platform: "telegram"
        identifier: -1001234567890
    ai_options:
      redesign: true
      header: "🚀 **Twitter News**"
      footer: "Source: X.com"

  - name: "Multi-Platform Repost"
    paused: true
    sources:
      - platform: "twitter"
        identifier: "BBCBreaking"
    targets:
      - platform: "telegram"
        identifier: -1009876543210
      - platform: "twitter"
        identifier: "my_news_bot"
    ai_options:
      redesign: false
      summarize: true
